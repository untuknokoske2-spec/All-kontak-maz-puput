<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins';background:linear-gradient(180deg,#5aa9ff,#5b2bbf);color:white;text-align:center;}
.container{max-width:400px;margin:auto;padding:20px;}
.profile{width:100px;height:100px;border-radius:50%;background:#fff;margin:auto;}
.card{background:#fff;color:#333;padding:15px;margin:10px 0;border-radius:15px;text-decoration:none;display:block;}
</style>
</head>
<body>
<div class="container">
<img id="photo" class="profile">
<h2 id="title"></h2>
<p id="bio"></p>
<div id="links"></div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const snap = await getDoc(doc(db,"links","main"));
const data = snap.data();

document.getElementById("title").innerText = data.title;
document.getElementById("bio").innerText = data.bio;
document.getElementById("photo").src = data.photo || "";

data.links.forEach(l=>{
document.getElementById("links").innerHTML += `<a href="${l.url}" class="card">${l.name}</a>`;
});
</script>
</body>
</html>
